name: Deploy Site

# Instantly republishes GitHub Pages whenever any file is committed.
# Does NOT scrape or call any API — just publishes whatever is currently
# in the repo (including the latest data.json from the last scrape).
# This is what makes editing index.html show up right away without
# burning LegiScan API quota on every edit.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
