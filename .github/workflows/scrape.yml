name: Nightly Legislative Scrape

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legets_clone
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Show repo structure (debug)
        run: |
          echo "Looking for requirements.txt from: $(pwd)"
          find .. -maxdepth 3 -name "requirements.txt" -o -name "scraper.py" 2>/dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/scraper.py --once

      - name: Commit refreshed data
        run: |
          git config user.name  "scrape-bot"
          git config user.email "scrape-bot@users.noreply.github.com"
          git add web/data.json data/legets.db || true
          git commit -m "chore: nightly data refresh ($(date -u +%Y-%m-%d))" || echo "no changes"
          git push || echo "nothing to push"

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: legets_clone/web
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
