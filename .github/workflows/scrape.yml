name: Nightly Legislative Scrape

# Runs the LegiScan API scrape ONLY on schedule or manual trigger.
# Deliberately NOT triggered by every push — 51 states x 18 topics = 918 API
# calls per run. Nightly-only keeps monthly usage (~27,500) safely under
# LegiScan's free 30,000/month limit. See deploy.yml for instant redeploys
# on file edits, which do NOT re-scrape or use any API quota.

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC nightly
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper (LegiScan free API)
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py --once
      - name: Commit refreshed data
        run: |
          git config user.name  "scrape-bot"
          git config user.email "scrape-bot@users.noreply.github.com"
          git add data.json legets.db || true
          git commit -m "chore: data refresh ($(date -u +%Y-%m-%d))" || echo "no changes"
          git push || echo "nothing to push"

  # Runs automatically right after a successful scrape, in the SAME workflow —
  # this sidesteps GitHub's rule that bot-pushed commits don't trigger other
  # workflows. No more manual "Run Deploy Site" needed after a scrape.
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pick up the just-pushed commit, not the pre-scrape checkout
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
