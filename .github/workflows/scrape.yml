name: Nightly Legislative Scrape

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py --once
      - name: Commit refreshed data
        run: |
          git config user.name  "scrape-bot"
          git config user.email "scrape-bot@users.noreply.github.com"
          git add data.json legets.db || true
          git commit -m "chore: data refresh ($(date -u +%Y-%m-%d))" || echo "no changes"
          git push || echo "nothing to push"

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
